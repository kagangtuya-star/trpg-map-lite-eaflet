services:
  trpg-map:
    image: ${TRPG_MAP_IMAGE:-ghcr.io/OWNER/REPO:latest}
    container_name: trpg-map-lite-leaflet
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    volumes:
      - ./data:/app/data
      - ./data/uploads:/app/public/uploads
      - ./data/tiles:/app/public/tiles
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
